<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Student Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<div class="auth-card">

    <div class="logo-circle">
        <i class="bi bi-mortarboard-fill"></i>
    </div>

    <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
        <span class="fw-bold fs-4">Student Portal</span>
    </div>
    <h1 class="fw-bold mt-2">Welcome Back</h1>
    <p class="text-muted mb-4">Sign in to your account</p>

    <form id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control form-control-lg" id="email" placeholder="Enter your email" required>
        </div>

        <div class="mb-2 text-start">
            <label class="form-label">Password</label>
            <div class="input-group">
                <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter your password" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <input type="checkbox" class="form-check-input me-1">
                <small>Remember me</small>
            </div>
            <a href="forgot_password.html" class="small text-primary">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100">Sign In</button>
    </form>

    <p class="mt-4">
        Don't have an account?
        <a href="register.html" class="text-primary">Register here</a>
    </p>
</div>

<script src="js/config.js"></script>
<script src="js/login.js"></script>
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
