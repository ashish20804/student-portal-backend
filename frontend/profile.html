<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-blue: #0d6efd;
        }
        body { background-color: #f8f9fa; }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #444; }
        .section-title { font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #222; }
        .read-only-box { background-color: #f0f7ff; border: 1px solid #cfe2ff; }
        
        /* Profile Image Styles */
        .profile-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
        }
        #profilePreview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--primary-blue);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #fff;
            transition: transform 0.2s;
        }
        .upload-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-white bg-white border-bottom px-4">
        <div class="d-flex align-items-center">
            <a href="dashboard.html" class="text-dark me-3"><i class="bi bi-arrow-left fs-4"></i></a>
            <div class="bg-primary text-white rounded-3 p-2 me-2" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-person-fill"></i>
            </div>
            <h5 class="fw-bold mb-0">Update Profile</h5>
        </div>
    </nav>

    <div class="container py-4" style="max-width: 800px;">
        <div class="mb-4 text-center text-md-start">
            <h4 class="fw-bold">Profile Settings</h4>
            <p class="text-muted small">Update your personal and academic information</p>
        </div>

        <form id="profileForm">
            <div class="profile-container">
                <img id="profilePreview" src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile">
                <label for="imageUpload" class="upload-btn">
                    <i class="bi bi-camera-fill"></i>
                </label>
                <input type="file" id="imageUpload" hidden accept="image/*">
            </div>

            <div class="card p-4 mb-4 read-only-box border-0 shadow-sm">
                <p class="fw-bold mb-3 small text-primary uppercase">
                    <i class="bi bi-info-circle-fill me-1"></i> System Information (Read-Only)
                </p>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Roll Number</label>
                        <input type="text" id="rollNumber" class="form-control bg-white" disabled>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control bg-white" disabled>
                    </div>
                </div>
            </div>

            <h5 class="section-title">Personal Information</h5>
            <div class="card p-4 border-0 shadow-sm">
                <div class="mb-3">
                    <label class="form-label">Full Name*</label>
                    <input type="text" id="fullName" class="form-control" required placeholder="Enter full name">
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" id="phoneNumber" class="form-control" placeholder="+91 xxxxx xxxxx">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Address</label>
                        <input type="text" id="address" class="form-control" placeholder="City, State">
                    </div>
                </div>
            </div>

            <h5 class="section-title">Academic Information</h5>
            <div class="card p-4 border-0 shadow-sm mb-5">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Programme</label>
                        <input type="text" id="program" class="form-control" placeholder="e.g. B.Tech">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Semester</label>
                        <input type="number" id="semester" class="form-control" placeholder="Current Semester">
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Department</label>
                        <input type="text" id="department" class="form-control" placeholder="e.g. Computer Science">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-5">
                <button type="button" class="btn btn-outline-secondary px-4 fw-semibold" onclick="window.location.href='dashboard.html'">
                    Discard
                </button>
                <button type="submit" id="saveBtn" class="btn btn-primary px-5 fw-bold shadow-sm">
                    Save Changes
                </button>
            </div>
        </form>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
