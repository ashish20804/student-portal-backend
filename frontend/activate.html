<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Account | Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<div class="auth-card">
    <div class="logo-circle">
        <i class="bi bi-shield-lock-fill"></i>
    </div>

    <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
        <span class="fw-bold fs-4">Student Portal</span>
    </div>
    <h1 class="fw-bold mt-2">Activate Account</h1>
    <p class="text-muted mb-4">Set your password to activate your faculty account</p>

    <div id="errorAlert" class="alert alert-danger d-none"></div>
    <div id="successAlert" class="alert alert-success d-none"></div>

    <form id="activateForm">
        <div class="mb-3 text-start">
            <label class="form-label">New Password</label>
            <div class="input-group">
                <input type="password" class="form-control form-control-lg" id="password" placeholder="Min 8 characters" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="Re-enter password" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmPassword', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" id="activateBtn">Activate & Set Password</button>
    </form>

    <p class="mt-4">
        Already activated? <a href="login.html" class="text-primary">Sign in here</a>
    </p>
</div>

<script src="js/activate.js"></script>
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
