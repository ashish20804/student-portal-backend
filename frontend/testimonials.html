<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Testimonials | Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            color: white;
            padding: 60px 0 80px;
            clip-path: ellipse(100% 85% at 50% 15%);
        }
        .testimonial-card {
            border: none;
            border-radius: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .testimonial-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.1) !important;
        }
        .testimonial-card.featured {
            border: 2px solid #ffc107;
        }
        .featured-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: #ffc107;
            color: #000;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .big-quote {
            font-size: 5rem;
            line-height: 1;
            color: #0d6efd;
            opacity: 0.08;
            position: absolute;
            top: 8px;
            left: 16px;
            font-family: Georgia, serif;
            pointer-events: none;
        }
        .avatar-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .own-actions { opacity: 0; transition: opacity 0.2s; }
        .testimonial-card:hover .own-actions { opacity: 1; }
        .content-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #444;
            min-height: 72px;
        }
        #charCount { font-size: 0.75rem; }
        .filter-btn.active { background: #0d6efd; color: white; border-color: #0d6efd; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar bg-white border-bottom px-4 sticky-top">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <a href="dashboard.html" class="text-dark me-3 text-decoration-none"><i class="bi bi-arrow-left fs-5"></i></a>
                <div class="bg-primary text-white rounded-circle p-2 me-2" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-mortarboard-fill small"></i>
                </div>
                <span class="navbar-brand fw-bold mb-0">Student Portal</span>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="text-muted small d-none d-md-inline" id="navUserName"></span>
                <div id="navAvatar" class="avatar-circle bg-primary" style="width:36px;height:36px;font-size:0.85rem;cursor:pointer;" onclick="window.location='profile.html'"></div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero-section text-center mb-n4">
        <h1 class="fw-bold display-6 mb-2"><i class="bi bi-chat-heart-fill me-2"></i>Student Stories</h1>
        <p class="opacity-75 mb-4">Real experiences from students across all departments</p>
        <button id="shareBtn" class="btn btn-light fw-bold px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#testiModal">
            <i class="bi bi-plus-lg me-1"></i> Share Your Story
        </button>
    </div>

    <div class="container py-5 mt-3">

        <!-- Stats + Filter bar -->
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
            <div class="d-flex gap-2" id="filterBar">
                <button class="btn btn-sm btn-outline-secondary filter-btn active" data-filter="all" onclick="applyFilter('all', this)">All</button>
                <button class="btn btn-sm btn-outline-warning filter-btn" data-filter="featured" onclick="applyFilter('featured', this)"><i class="bi bi-star-fill me-1 text-warning"></i>Featured</button>
            </div>
            <span class="text-muted small" id="countLabel"></span>
        </div>

        <!-- Grid -->
        <div class="row g-4" id="testimonialGrid">
            <!-- skeleton placeholders -->
            <div class="col-md-4"><div class="skeleton" style="height:180px;"></div></div>
            <div class="col-md-4"><div class="skeleton" style="height:180px;"></div></div>
            <div class="col-md-4"><div class="skeleton" style="height:180px;"></div></div>
        </div>
    </div>

    <!-- Add / Edit Modal -->
    <div class="modal fade" id="testiModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <div>
                        <h5 class="fw-bold mb-0" id="modalTitle">Share Your Story</h5>
                        <p class="text-muted small mb-0">Your testimonial will be visible to all students</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 pb-0">
                    <input type="hidden" id="editingId" value="">
                    <div class="mb-3">
                        <label class="small fw-bold text-muted mb-1">YOUR MESSAGE <span class="text-danger">*</span></label>
                        <textarea id="testiContent" class="form-control" rows="5"
                            placeholder="Share your placement journey, learning experience, or how the portal helped you..."
                            oninput="updateCharCount(this)"></textarea>
                        <div class="d-flex justify-content-end mt-1">
                            <span id="charCount" class="text-muted">0 / 1000</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4 pt-2 gap-2">
                    <button type="button" class="btn btn-light flex-fill" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary flex-fill fw-bold" id="submitBtn" onclick="submitTestimonial()">
                        <i class="bi bi-send me-1"></i> Post
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-body text-center p-4">
                    <div class="text-danger mb-3" style="font-size:2.5rem;"><i class="bi bi-trash3-fill"></i></div>
                    <h6 class="fw-bold">Delete Testimonial?</h6>
                    <p class="text-muted small">This action cannot be undone.</p>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-light flex-fill" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-danger flex-fill" id="confirmDeleteBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/testimonials.js"></script>
</body>
</html>
