<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<div class="auth-card">
    <div class="logo-circle">🔑</div>

    <h1 class="fw-bold" id="forgotTitle">Reset Password</h1>
    <p class="text-muted mb-4" id="forgotSubtitle">Enter your email to receive a 6-digit OTP</p>

    <form id="requestOtpForm">
        <div class="mb-3 text-start">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control form-control-lg" id="resetEmail" placeholder="Enter your college email" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" id="sendOtpBtn">Send OTP</button>
    </form>

    <form id="resetPasswordForm" style="display: none;">
        <div class="mb-3 text-start">
            <label class="form-label">OTP Code</label>
            <input type="text" class="form-control form-control-lg text-center fw-bold" id="otpCode" placeholder="000000" maxlength="6" required>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">New Password</label>
            <div class="input-group">
                <input type="password" class="form-control form-control-lg" id="newPassword" placeholder="Minimum 8 characters" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('newPassword', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100">Update Password</button>
    </form>

    <p class="mt-4">
        Remembered your password?
        <a href="login.html" class="text-primary">Back to Login</a>
    </p>
</div>

<script src="js/config.js"></script>
<script src="js/forgot_password.js"></script>
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
